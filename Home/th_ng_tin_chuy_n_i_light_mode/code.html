<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thông tin chuyến đi - AI Travel Planner</title>
<!-- Google Fonts: Be Vietnam Pro -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#ff6b00",
            "background": "#ffffff",
            "surface": "#ffffff",
            "surface-container": "#f9fafb",
            "border-muted": "#e5e7eb",
            "text-primary": "#111827",
            "text-secondary": "#4b5563",
            "outline": "#d1d5db"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "eight": "8px",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "sans": ['Be Vietnam Pro', 'sans-serif'],
          }
        },
      },
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #ffffff;
      color: #111827;
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    /* Custom style for date input icons */
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-background">
<!-- BEGIN: TripInformationContainer -->
<main class="w-full max-w-4xl bg-surface rounded-eight p-8 md:p-12 shadow-xl border border-border-muted" data-purpose="trip-info-form-container">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-12">
<h1 class="text-3xl md:text-4xl font-bold text-text-primary mb-4">Thông tin chuyến đi</h1>
<p class="text-text-secondary max-w-xl mx-auto leading-relaxed">
      Cung cấp các thông tin cơ bản để AI tối ưu hóa chi phí và khoảng cách di chuyển.
    </p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: FormFields -->
<form class="space-y-8">
<!-- Grid for Location and People -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Departure Location -->
<div class="space-y-2">
<label class="block text-xs font-bold text-text-secondary uppercase tracking-widest">Điểm xuất phát</label>
<input class="w-full bg-white border-outline rounded-eight py-3 px-4 text-text-primary focus:ring-primary focus:border-primary transition-colors" placeholder="Nhập điểm xuất phát" type="text" value="Pleiku, Gia Lai"/>
</div>
<!-- Number of People -->
<div class="space-y-2">
<label class="block text-xs font-bold text-text-secondary uppercase tracking-widest">Số lượng người</label>
<input class="w-full bg-white border-outline rounded-eight py-3 px-4 text-text-primary focus:ring-primary focus:border-primary transition-colors" type="number" value="2"/>
</div>
</div>
<!-- Grid for Dates -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Departure Date -->
<div class="space-y-2">
<label class="block text-xs font-bold text-text-secondary uppercase tracking-widest">Ngày đi</label>
<div class="relative">
<input class="w-full bg-white border-outline rounded-eight py-3 px-4 text-text-primary focus:ring-primary focus:border-primary transition-colors appearance-none" type="date" value="2026-06-01"/>
</div>
</div>
<!-- Return Date -->
<div class="space-y-2">
<label class="block text-xs font-bold text-text-secondary uppercase tracking-widest">Ngày về</label>
<div class="relative">
<input class="w-full bg-white border-outline rounded-eight py-3 px-4 text-text-primary focus:ring-primary focus:border-primary transition-colors appearance-none" type="date" value="2026-05-31"/>
</div>
</div>
</div>
<!-- BEGIN: BudgetSelection -->
<div class="space-y-4">
<label class="block text-xs font-bold text-text-secondary uppercase tracking-widest">Mức ngân sách dự kiến</label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Standard (Selected) -->
<div class="relative cursor-pointer group" data-purpose="budget-option-selected">
<input checked="" class="peer hidden" id="standard" name="budget" type="radio"/>
<label class="block p-5 text-center rounded-eight border-2 border-primary bg-primary/5 transition-all duration-300 peer-checked:border-primary" for="standard">
<div class="font-bold text-text-primary text-lg">Tiêu chuẩn</div>
<div class="text-sm text-text-secondary mt-1">Cân bằng chi phí</div>
</label>
</div>
<!-- Economy -->
<div class="relative cursor-pointer group" data-purpose="budget-option">
<input class="peer hidden" id="economy" name="budget" type="radio"/>
<label class="block p-5 text-center rounded-eight border border-outline bg-white hover:border-text-secondary transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:border-2" for="economy">
<div class="font-bold text-text-primary text-lg">Tiết kiệm</div>
<div class="text-sm text-text-secondary mt-1">Ưu tiên điểm miễn phí</div>
</label>
</div>
<!-- Luxury -->
<div class="relative cursor-pointer group" data-purpose="budget-option">
<input class="peer hidden" id="luxury" name="budget" type="radio"/>
<label class="block p-5 text-center rounded-eight border border-outline bg-white hover:border-text-secondary transition-all duration-300 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:border-2" for="luxury">
<div class="font-bold text-text-primary text-lg">Nghỉ dưỡng</div>
<div class="text-sm text-text-secondary mt-1">Trải nghiệm cao cấp</div>
</label>
</div>
</div>
</div>
<!-- END: BudgetSelection -->
<!-- BEGIN: NavigationActions -->
<div class="flex flex-col md:flex-row items-center justify-between pt-8 gap-4">
<!-- Back Button -->
<button class="w-full md:w-auto flex items-center justify-center gap-2 px-8 py-3 rounded-eight border border-outline text-text-primary font-medium hover:bg-gray-50 transition-all duration-300" data-purpose="back-button" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        Quay lại
      </button>
<!-- Submit Button -->
<button class="w-full md:w-auto flex items-center justify-center gap-3 px-10 py-4 rounded-eight bg-primary hover:bg-[#e65a00] text-white font-bold shadow-lg shadow-primary/20 transition-all duration-300" data-purpose="generate-itinerary-button" type="submit">
        AI Lập Lịch Trình
        <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7.5 5.6L10 7L8.6 4.5L10 2L7.5 3.4L5 2L6.4 4.5L5 7L7.5 5.6ZM19.5 15.4L17 14L18.4 16.5L17 19L19.5 17.6L22 19L20.6 16.5L22 14L19.5 15.4ZM22 2L19.5 3.4L17 2L18.4 4.5L17 7L19.5 5.6L22 7L20.6 4.5L22 2ZM14.7 6.4C14.3 6 13.7 6 13.3 6.4L2.4 17.3C2 17.7 2 18.3 2.4 18.7L5.3 21.6C5.7 22 6.3 22 6.7 21.6L17.6 10.7C18 10.3 18 9.7 17.6 9.3L14.7 6.4ZM14.1 12.3L11.7 9.9L13.9 7.7L16.3 10.1L14.1 12.3Z"></path>
</svg>
</button>
</div>
<!-- END: NavigationActions -->
</form>
<!-- END: FormFields -->
</main>
<!-- END: TripInformationContainer -->
</body></html>
